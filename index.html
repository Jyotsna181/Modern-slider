<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indian Motorcycle Showcase</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }

      .showcase-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 100vh;
        width: 100vw;
        padding: 0 5%;
        transition: background-color 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        overflow: hidden;
      }

      .side-content {
        width: 25%;
        z-index: 10;
      }

      .left-side {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 50vh;
      }

      .right-side {
        text-align: left;
        font-size: 0.85rem;
        line-height: 1.6;
        color: #444;
      }

      .brand {
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        display: block;
        margin-bottom: 10px;
        color: #222;
      }

      h1 {
        font-size: 3.5rem;
        line-height: 1.1;
        font-weight: 700;
        margin-bottom: 15px;
        color: #111;
      }

      .price {
        font-size: 1.1rem;
        font-weight: 600;
        color: #222;
      }

      .spec-title {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: block;
      }

      .image-stage {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
      }

      .display-panel {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background-color 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .display-panel img {
        max-width: 55%;
        height: auto;
        object-fit: contain;
      }

      #panel-reveal {
        z-index: 2;
        clip-path: circle(0% at 50% 90%);
      }

      #panel-reveal.ripple-active {
        animation: containerGrow 1.2s cubic-bezier(0.25, 1, 0.3, 1) forwards;
      }

      @keyframes containerGrow {
        0% {
          clip-path: circle(0px at 50% 90%);
        }
        30% {
          clip-path: circle(120px at 50% 50%);
        }
        100% {
          clip-path: circle(150% at 50% 50%);
        }
      }

      .thumbnail-tray {
        position: absolute;
        bottom: 5vh;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 20;
      }

      .thumb-btn {
        width: 90px;
        height: 60px;
        border: 2px solid transparent;
        background: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        padding: 5px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .thumb-btn img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .thumb-btn.active,
      .thumb-btn:hover {
        border-color: #111;
        background: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <div
      class="showcase-container"
      id="bg-stage"
      style="background-color: #e2e4e1"
    >
      <div class="side-content left-side">
        <div>
          <span class="brand">Indian Motorcycle</span>
          <h1 id="bike-title">Scout Bobber Twenty</h1>
          <p class="price" id="bike-price">STARTING AT $21,495*</p>
        </div>
      </div>

      <div class="image-stage">
        <div
          class="display-panel"
          id="panel-base"
          style="background-color: #e2e4e1"
        >
          <img src="bike1.png" id="img-base" alt="Previous Asset" />
        </div>
        <div
          class="display-panel"
          id="panel-reveal"
          style="background-color: #e2e4e1"
        >
          <img src="bike1.png" id="img-reveal" alt="Active Asset" />
        </div>
      </div>

      <div class="side-content right-side">
        <span class="spec-title">Standard Equipment</span>
        <p id="bike-specs">
          Features blacked-out styling, raw bobber aesthetics, mini-ape
          handlebars, and wire wheels for an aggressive heritage profile.
        </p>
      </div>

      <div class="thumbnail-tray">
        <button class="thumb-btn active" onclick="triggerTransition(0, this)">
          <img src="bike1.png" alt="Thumb 1" />
        </button>
        <button class="thumb-btn" onclick="triggerTransition(1, this)">
          <img src="bike2.png" alt="Thumb 2" />
        </button>
        <button class="thumb-btn" onclick="triggerTransition(2, this)">
          <img src="bike3.png" alt="Thumb 3" />
        </button>
      </div>
    </div>

    <script>
      const catalog = [
        {
          title: "Scout Bobber Twenty",
          price: "STARTING AT $21,495*",
          bg: "#E4E4E4",
          img: "bike1.png",
          specs:
            "Features blacked-out styling, raw bobber aesthetics, mini-ape handlebars, and wire wheels for an aggressive heritage profile.",
        },
        {
          title: "Springfield Dark Horse",
          price: "STARTING AT $22,495*",
          bg: "#DBDBDB",
          img: "bike2.png",
          specs:
            "A premium blacked-out tourer featuring hard saddlebags, streamlined fairings, and a commanding stance designed for the open highway.",
        },
        {
          title: "Indian Chief Vintage",
          price: "STARTING AT $20,995*",
          bg: "#E5E5E5",
          img: "bike3.png",
          specs:
            "Brings traditional classic design back with timeless chrome details, vintage whitewall tires, and desert tan fringed leather luggage.",
        },
      ];

      let currentIndex = 0;

      function triggerTransition(targetIndex, buttonElement) {
        if (targetIndex === currentIndex) return;

        const bgStage = document.getElementById("bg-stage");

        const panelBase = document.getElementById("panel-base");
        const panelReveal = document.getElementById("panel-reveal");

        const imgBase = document.getElementById("img-base");
        const imgReveal = document.getElementById("img-reveal");

        panelBase.style.backgroundColor = catalog[currentIndex].bg;
        imgBase.src = catalog[currentIndex].img;

        panelReveal.style.backgroundColor = catalog[targetIndex].bg;
        imgReveal.src = catalog[targetIndex].img;

        panelReveal.classList.remove("ripple-active");
        void panelReveal.offsetWidth;

        document.getElementById("bike-title").innerText =
          catalog[targetIndex].title;
        document.getElementById("bike-price").innerText =
          catalog[targetIndex].price;
        document.getElementById("bike-specs").innerText =
          catalog[targetIndex].specs;

        bgStage.style.backgroundColor = catalog[targetIndex].bg;

        panelReveal.classList.add("ripple-active");

        document
          .querySelectorAll(".thumb-btn")
          .forEach((btn) => btn.classList.remove("active"));
        buttonElement.classList.add("active");

        currentIndex = targetIndex;
      }
    </script>
  </body>
</html>
